<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lima Community Church Podcast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 20px auto;
      padding: 0 16px;
      color: #222;
      background-color: #000;
      text-align: center;
    }

    /* blank header space (≈3 lines) */
    .header-spacer {
      height: 100px;
    }

    h2 {
      color: white;
      margin-bottom: 20px;
    }

    .episode {
      border-bottom: 1px solid #444;
      padding: 20px 0;
      text-align: center;
    }

    .episode h3 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .date {
      color: #ccc;
      margin-bottom: 10px;
      font-size: 14px;
    }

    audio {
      width: 100%;
      margin-bottom: 10px;
    }

/* thinner, visible progress bar */
audio::-webkit-media-controls-timeline {
  height: 6px !important;        /* slim but visible */
  background-color: #c9c9c9 !important;
  border-radius: 4px !important;
}

/* restore default control panel so it no longer blends into black */
audio::-webkit-media-controls-panel {
  background-color: #c9c9c9 !important;   /* subtle dark gray instead of pure black */
}


    .download {
      color: #66aaff;
      text-decoration: none;
      font-size: 14px;
    }

    #load-more {
      display: block;
      margin: 24px auto;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #222;
      color: white;
      border: 1px solid #555;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  
  <div class="header-spacer"></div>

  <h2>Lima Community Church Podcast</h2>

  <div id="episodes"></div>
  <button id="load-more">Load More Episodes</button>

  <script>
    const FEED = "https://corsproxy.io/?" + encodeURIComponent("https://www.limacommunitychurch.com/podcast?format=rss");
    let items = [];
    let index = 0;
    const perPage = 5;

    function render() {
      const container = document.getElementById("episodes");
      const slice = items.slice(index, index + perPage);

      slice.forEach(ep => {
        const div = document.createElement("div");
        div.className = "episode";
        div.innerHTML = `
          <h3>${ep.title}</h3>
          <div class="date">${ep.date}</div>
          <audio controls>
            <source src="${ep.audio}" type="audio/mpeg">
          </audio>
		  <!-- <a class="download" href="${ep.audio}" download>Download</a> -->
        `;
        container.appendChild(div);
      });

      index += perPage;
      if (index >= items.length) {
        document.getElementById("load-more").style.display = "none";
      }
    }

    fetch(FEED)
      .then(r => r.text())
      .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
      .then(xml => {
        const raw = [...xml.querySelectorAll("item")];
        items = raw.map(item => ({
          title: item.querySelector("title")?.textContent || "Untitled",
          date: new Date(item.querySelector("pubDate")?.textContent).toLocaleDateString(),
          audio: item.querySelector("enclosure")?.getAttribute("url")
        })).filter(ep => ep.audio);
        render();
      })
      .catch(err => {
        document.getElementById("episodes").innerHTML =
          "<p style='color:red;'>Unable to load podcast feed.</p>";
        console.error(err);
      });

    document.getElementById("load-more").addEventListener("click", render);
  </script>

</body>
</html>
